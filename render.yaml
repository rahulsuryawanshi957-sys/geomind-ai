# Infrastructure-as-code definition for Render. This documents the exact
# settings the two services need -- useful for recreating the deploy from
# scratch, and for spotting config drift versus what's set in the dashboard.
# Render does NOT auto-apply this unless you use "New + > Blueprint" and
# point it at this repo; services created manually in the dashboard (as this
# project's were) keep their own settings until you edit them there.
services:
  - type: web
    name: raahigeo-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set manually in the Render dashboard -- never commit real keys
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: CHAT_MODEL
        value: gemini-3.5-flash
      - key: CORS_ORIGINS
        value: https://geomind-ai-1.onrender.com,http://localhost:5173,http://localhost:3000
    healthCheckPath: /api/health

  - type: web
    name: raahigeo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://geomind-ai.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
